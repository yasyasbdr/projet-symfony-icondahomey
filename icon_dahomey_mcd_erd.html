<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)">Schéma entités-relations de la plateforme Icon Dahomey : 17 entités reliées par leurs cardinalités, avec héritage sur Product.</h2>
<style>
#erd { padding: 1rem 0; overflow-x: auto; }
#erd svg { max-width: 100%; height: auto; }
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const source = `erDiagram
  USER ||--o{ ADDRESS : "possede"
  USER ||--o{ ORDER : "passe"
  USER ||--o| CART : "detient"
  USER ||--o{ CUSTOMIZATION_REQUEST : "demande"
  USER ||--o{ CONVERSATION : "ouvre"
  USER ||--o{ MESSAGE : "envoie"
  USER }o--o{ PRODUCT : "favoris"
  CATEGORY ||--o{ PRODUCT : "classe"
  CATEGORY ||--o{ CATEGORY : "sous-categorie"
  PRODUCT ||--o{ PRODUCT_IMAGE : "illustre"
  PRODUCT }o--o{ TAG : "etiquette"
  PRODUCT ||--|| PHYSICAL_CREATION : "specialise"
  PRODUCT ||--|| DIGITAL_PATTERN : "specialise"
  PHYSICAL_CREATION ||--o| DIGITAL_PATTERN : "patron associe"
  CART ||--o{ CART_ITEM : "contient"
  PRODUCT ||--o{ CART_ITEM : "reference"
  ORDER ||--|{ ORDER_ITEM : "compose"
  PRODUCT ||--o{ ORDER_ITEM : "vendu via"
  ORDER ||--o{ ORDER_STATUS_HISTORY : "historise"
  ORDER ||--o| PAYMENT : "reglee par"
  PRODUCT ||--o{ CUSTOMIZATION_REQUEST : "cible"
  CUSTOMIZATION_REQUEST ||--o| ORDER_ITEM : "concretise"
  CONVERSATION ||--o{ MESSAGE : "regroupe"

  USER {
    int id PK
    string email UK
    json roles
    string password
    string firstName
    string lastName
    string phone
    bool isBlocked
    bool isVerified
    datetime createdAt
  }
  ADDRESS {
    int id PK
    int user_id FK
    string label
    string recipientName
    string line1
    string postalCode
    string city
    string country
    bool isDefault
  }
  PRODUCT {
    int id PK
    int category_id FK
    string product_type
    string name
    string slug UK
    text description
    decimal basePrice
    bool isPublished
    bool isCustomizable
    datetime createdAt
  }
  PHYSICAL_CREATION {
    int stock
    bool requiresMeasurements
  }
  DIGITAL_PATTERN {
    string pdfFilename
    enum difficultyLevel
    int pageCount
  }
  CATEGORY {
    int id PK
    int parent_id FK
    string name
    string slug
    text description
  }
  PRODUCT_IMAGE {
    int id PK
    int product_id FK
    string filename
    string altText
    int position
    bool isMain
  }
  TAG {
    int id PK
    string name
    string slug
  }
  CART {
    int id PK
    int user_id FK
    datetime updatedAt
  }
  CART_ITEM {
    int id PK
    int cart_id FK
    int product_id FK
    int quantity
    enum selectedType
    json measurements
    text customizationNote
  }
  ORDER {
    int id PK
    int user_id FK
    string reference UK
    enum status
    int progressPercent
    decimal totalAmount
    string trackingNumber
    string carrier
    datetime createdAt
  }
  ORDER_ITEM {
    int id PK
    int order_id FK
    int product_id FK
    string productName
    decimal unitPrice
    int quantity
    enum selectedType
    json measurements
  }
  ORDER_STATUS_HISTORY {
    int id PK
    int order_id FK
    enum status
    int progressPercent
    text comment
    datetime createdAt
  }
  PAYMENT {
    int id PK
    int order_id FK
    string stripePaymentIntentId
    decimal amount
    string currency
    enum status
    datetime paidAt
  }
  CUSTOMIZATION_REQUEST {
    int id PK
    int user_id FK
    int product_id FK
    int order_item_id FK
    text description
    decimal proposedPrice
    enum status
    datetime requestedAt
    datetime decidedAt
  }
  CONVERSATION {
    int id PK
    int client_id FK
    string subject
    bool isClosed
    datetime createdAt
    datetime updatedAt
  }
  MESSAGE {
    int id PK
    int conversation_id FK
    int sender_id FK
    text content
    bool isRead
    datetime createdAt
  }`;
const { svg } = await mermaid.render('erd-svg', source);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
