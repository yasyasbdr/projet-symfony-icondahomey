name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  tests:
    name: Lint, Analyse & Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: icon_dahomey_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping" --health-interval=10s
          --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_mysql, bcmath
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      # --- Qualité : linters Symfony ---
      - name: Lint YAML
        run: php bin/console lint:yaml config --parse-tags

      - name: Lint Twig
        run: php bin/console lint:twig templates

      - name: Lint container (services)
        run: php bin/console lint:container

      # --- Analyse statique ---
      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress

      # --- Base de test ---
      - name: Prepare test database
        env:
          DATABASE_URL: "mysql://root:root@127.0.0.1:3306/icon_dahomey_test?serverVersion=8.0.32&charset=utf8mb4"
        run: |
          php bin/console doctrine:database:create --env=test --if-not-exists || true
          php bin/console doctrine:schema:create --env=test || true

      # --- Tests ---
      - name: Run tests
        env:
          DATABASE_URL: "mysql://root:root@127.0.0.1:3306/icon_dahomey_test?serverVersion=8.0.32&charset=utf8mb4"
        run: php bin/phpunit
